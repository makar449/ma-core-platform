services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ma_core
      POSTGRES_USER: ma_core
      POSTGRES_PASSWORD: ma_core_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ma_core -d ma_core"]
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: test
      API_PORT: 4100
      POSTGRES_URL: postgres://ma_core:ma_core_password@postgres:5432/ma_core
      REDIS_URL: redis://redis:6379
      VAULT_MASTER_KEY_BASE64: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      VAULT_KEY_PROVIDER: env
      VAULT_KEY_VERSION: e2e-v1
      JWT_AUTH_SECRET_BASE64: MTExMTExMTExMTExMTExMTExMTExMTExMTExMTExMTE=
      AUTH_REGISTRATION_MODE: open
      WEB_ORIGIN: http://web:3000
      EMBEDDING_PROVIDER: deterministic
      EMBEDDING_DIMENSIONS: 64
    command: ["sh", "-lc", "pnpm --filter @ma-core/api migrate && pnpm --filter @ma-core/api start"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api:4100
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://api:4100
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 30
  e2e:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    depends_on:
      web:
        condition: service_healthy
    working_dir: /work
    volumes:
      - .:/work
    environment:
      E2E_USE_EXISTING_STACK: "true"
      E2E_WEB_URL: http://web:3000
      E2E_API_URL: http://api:4100
    command: ["sh", "-lc", "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @ma-core/shared build && pnpm exec playwright test -c apps/web/playwright.config.ts"]
