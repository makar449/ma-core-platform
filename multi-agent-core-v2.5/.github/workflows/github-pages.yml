name: Deploy static demo to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Static audit
        run: node scripts/static-audit.mjs && node scripts/part2-safety-audit.mjs

      - name: Build shared package
        run: pnpm --filter @ma-core/shared build

      - name: Build GitHub Pages demo
        working-directory: apps/web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PRIVATE_BUILD_WORKER: "1"
          NEXT_PUBLIC_DEPLOY_TARGET: github-pages
          NEXT_PUBLIC_DEMO_MODE: "true"
          NEXT_PUBLIC_GITHUB_PAGES_REPO: ${{ github.event.repository.name }}
        run: pnpm exec next build

      - name: Disable Jekyll
        run: touch apps/web/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
